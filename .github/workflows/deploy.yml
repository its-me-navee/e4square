name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        run: npm --prefix client ci

      - name: Build client
        run: npm --prefix client run build

      - name: Install server dependencies
        run: npm --prefix server ci

  deploy:
    name: Deploy to Lightsail
    runs-on: ubuntu-latest
    environment: production
    needs: build
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - name: Configure SSH
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
          LIGHTSAIL_SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
        run: |
          test -n "$LIGHTSAIL_HOST"
          test -n "$LIGHTSAIL_USER"
          test -n "$LIGHTSAIL_SSH_KEY"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$LIGHTSAIL_SSH_KEY" > ~/.ssh/lightsail_key
          chmod 600 ~/.ssh/lightsail_key
          ssh-keyscan -H "$LIGHTSAIL_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Pull and restart app
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_PORT: ${{ secrets.LIGHTSAIL_PORT }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
          LIGHTSAIL_APP_DIR: ${{ secrets.LIGHTSAIL_APP_DIR }}
        run: |
          PORT="${LIGHTSAIL_PORT:-22}"
          APP_DIR="${LIGHTSAIL_APP_DIR:-/opt/e4square}"
          ssh \
            -i ~/.ssh/lightsail_key \
            -p "$PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "$LIGHTSAIL_USER@$LIGHTSAIL_HOST" \
            "cd '$APP_DIR' && git pull --ff-only origin main && docker compose up -d --build && docker image prune -f && docker compose ps && curl --fail --silent --show-error http://127.0.0.1:5000/health"
