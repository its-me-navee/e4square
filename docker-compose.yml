services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      PUZZLES_DB_PATH: /app/server/data/puzzles.db
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./server/data:/app/server/data:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
